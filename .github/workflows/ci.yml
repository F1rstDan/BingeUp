name: CI

on:
  push:
    branches: [main]
    paths-ignore: &documentation_only
      - 'docs/**'
      - '*.md'
      - 'vMDs.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *documentation_only

permissions:
  contents: read

# E2E 不进入 CI（仅本地/手动运行）。跳过 Playwright 浏览器下载，
# 避免 npm ci 在每次构建时拉取 ~150MB 浏览器二进制。
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Format / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare WXT
        run: npx wxt prepare

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: chrome
            script: build
          - target: edge
            script: build:edge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.target }})
        run: npm run ${{ matrix.script }}
